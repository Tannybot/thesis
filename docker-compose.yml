version: '3.8'

services:
  # FastAPI Backend
  backend:
    build: ./backend
    container_name: livestock-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./livestock.db
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - DEBUG=false
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - backend_data:/app/data
      - qr_codes:/app/qr_codes
    restart: unless-stopped

  # React Frontend
  frontend:
    build: ./frontend
    container_name: livestock-web
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  qr_codes:
